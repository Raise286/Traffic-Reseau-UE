version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:5432/agency_db
      - SPRING_R2DBC_USERNAME=agency
      - SPRING_R2DBC_PASSWORD=password
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=agency
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=agency_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: